<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlowLane Checkout Canceled</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0d1018;
      --panel: #181d29;
      --panel-2: #202737;
      --text: #eef2ff;
      --muted: #9aa6c7;
      --accent: #7c6cff;
      --border: rgba(255, 255, 255, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Inter, "Segoe UI", system-ui, sans-serif;
      background:
        radial-gradient(circle at top, rgba(124, 108, 255, 0.22), transparent 34%),
        radial-gradient(circle at bottom right, rgba(94, 240, 197, 0.12), transparent 28%),
        var(--bg);
      color: var(--text);
    }
    .card {
      width: min(640px, 100%);
      border: 1px solid var(--border);
      border-radius: 24px;
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.4);
      padding: 32px;
      text-align: center;
    }
    .eyebrow {
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    h1 { margin: 14px 0 10px; font-size: clamp(30px, 5vw, 42px); }
    p { margin: 0; color: var(--muted); line-height: 1.6; }
    .actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 26px; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 18px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 700;
      transition: transform 0.18s ease;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn-primary { background: linear-gradient(135deg, var(--accent), #5a48e6); color: #fff; }
    .btn-outline { border: 1px solid var(--border); color: var(--text); }
  </style>
</head>
<body>
  <main class="card">
    <div class="eyebrow">FlowLane Premium</div>
    <h1>Checkout canceled</h1>
    <p>No purchase was completed. You can return to the pricing page, open the web app, or start checkout again whenever you are ready.</p>
    <div class="actions">
      <a class="btn btn-primary" href="/#pricing">Return to Pricing</a>
      <a class="btn btn-outline" href="https://app.flowlanekanban.com">Open Web App</a>
    </div>
  </main>
</body>
</html>
